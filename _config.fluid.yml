#---------------------------
# Hexo Theme Fluid
# Author: Fluid-dev
# Github: https://github.com/fluid-dev/hexo-theme-fluid
#
# 配置指南: https://fluid.ist/docs/guide/
#---------------------------

#---------------------------
# 全局 Global
#---------------------------
# 浏览器标签页图标（放在 source/img/ 下）
favicon: /img/avatar.png
# 苹果设备触屏图标
apple_touch_icon: /img/avatar.png
# 浏览器标签页标题分隔符，效果：文章名 - 站点名
tab_title_separator: " - "
# 是否显示站点标题
title_visibility: true
# 是否显示站点副标题
subtitle_visibility: true
subtitle: "还要拐几个弯才能到呢"

# 强制全局 HTTPS（解决 Mixed Content 警告）
# 开启后所有 HTTP 资源会被强制升级为 HTTPS
force_https: false

# 代码高亮
# lib 可选: highlightjs | prismjs
code:
  enable: true
  lib: "highlightjs"        # 高亮库
  highlightjs:
    style: "github"         # 亮色主题风格
    style_dark: "github-dark"  # 暗色主题风格
    bg_color: false         # 是否显示代码块背景色
    copy_btn: true          # 是否显示复制按钮
  prismjs:
    style: "default"
    style_dark: "tomorrow night"
    preprocess: true

# 趣味功能
fun_features:
  # 打字机效果（首页副标题）
  typing:
    enable: true           # 是否开启
    typeSpeed: 50          # 打字速度，数字越大越慢
    cursorChar: "_"        # 光标字符
    loop: false            # 是否循环播放
    scope: []              # 限定页面: home|post|tag|category|about|links|page|404，不填则全部
  # 标题锚点链接（点击标题旁的 ¶ 可复制锚点）
  anchorjs:
    enable: true
    element: h1,h2,h3,h4,h5,h6
    placement: left
    visible: hover         # hover: 悬停显示 | always: 始终显示
    icon: "¶"

# 暗色模式
# default: auto(跟随系统+时间段) | light(默认亮色) | dark(默认暗色)
dark_mode:
  enable: true
  default: auto            # 用户手动切换后会记住选择

# 主题配色（其他颜色需用自定义 CSS）
# 配色灵感: https://www.webdesignrankings.com/resources/lolcolors/
color:
  body_bg_color: "#eee"              # 页面背景色
  body_bg_color_dark: "#181c27"      # 暗色模式背景
  navbar_bg_color: "#2f4154"         # 导航栏背景色
  navbar_bg_color_dark: "#1f3144"    # 暗色模式导航栏
  navbar_text_color: "#fff"          # 导航栏文字色
  navbar_text_color_dark: "#d0d0d0"
  subtitle_color: "#fff"             # 副标题颜色
  subtitle_color_dark: "#d0d0d0"
  text_color: "#3c4858"              # 正文颜色
  text_color_dark: "#c4c6c9"
  link_color: "#337ab7"              # 链接颜色
  link_color_dark: "#4090d6"
  board_color: "#fff"                # 卡片背景色
  board_color_dark: "#252d38"

# 自定义 JS 文件（路径相对于 source 目录，如 /js/custom.js 对应 source/js/custom.js）
custom_js:
custom_css:

# 网页访问统计（百度/Google Analytics/LeanCloud 等）
web_analytics:
  enable: false           # 总开关
  follow_dnt: true        # 遵循浏览器"请勿追踪"设置
  baidu:                  # 百度统计 key（hm.js? 后的字符串）
  google:
    measurement_id:       # Google Analytics 4 媒体资源 ID
  tencent:                # 腾讯移动分析
    sid:
    cid:
  leancloud:              # LeanCloud 统计（可用于 PV/UV 展示）
    app_id:
    app_key:
    server_url:           # REST API 地址，国际版不填
    path: window.location.pathname
    ignore_local: false   # 忽略本地访问
  openkounter:            # OpenKounter 计数统计
    server_url: https://open-kounter.mintimate.cn
    path: window.location.pathname
    ignore_local: false
  umami:                  # Umami 自部署统计
    src:
    website_id:
    domains:
    start_time: 2024-01-01
    token:
    api_server:

# Canonical URL（向搜索引擎指定规范网址，需先在 _config.yml 配置 url）
canonical:
  enable: false

# 图片懒加载（⚠ 已禁用，如果开启可能导致 srcset 异常）
lazyload:
  enable: false              # 是否启用
  loading_img: /img/loading.gif  # 加载时占位图
  onlypost: false            # 仅在文章页启用
  offset_factor: 2           # 提前触发加载的偏移倍数（基数为视窗高度）

# 图标字体库 CDN（包含社交图标等）
iconfont: //at.alicdn.com/t/c/font_1736178_k526ubmyhba.css

#---------------------------
# 页头 Header
#---------------------------
navbar:
  # 导航栏左侧标题（为空则使用 _config.yml 的 title）
  blog_title: "Xendr1a的小窝"
  # 导航栏毛玻璃特效（实验性，可能造成滚动卡顿）
  ground_glass:
    enable: false
    px: 3                   # 模糊像素
    alpha: 0.7              # 不透明度 0-1.0
  # 导航栏菜单：key=显示名称, link=链接, icon=图标css类, name=强制显示名称(可选)
  # 支持二级菜单：添加 submenu 字段
  menu:
    - { key: "home", link: "/", icon: "iconfont icon-home-fill" }
    - { key: "archive", link: "/archives/", icon: "iconfont icon-archive-fill" }
    - { key: "category", link: "/categories/", icon: "iconfont icon-category-fill" }
    - { key: "tag", link: "/tags/", icon: "iconfont icon-tags-fill" }
    - { key: "about", link: "/about/", icon: "iconfont icon-user-fill" }
    # 友链页（取消注释以启用）
    #- { key: "links", link: "/links/", icon: "iconfont icon-link-fill" }

# 本地搜索（需安装 hexo-generator-search 插件）
search:
  enable: true
  path: /local-search.xml       # 搜索索引文件路径
  generate_path: /local-search.xml
  field: post                   # 搜索范围: post | page | all
  content: true                 # 是否搜索正文内容

# 页面顶部大图（Banner）
banner:
  random_img: false             # 随机头图（图片放在 source/img/random/）
  parallax: true                # 视差滚动效果
  width_height_ratio: 1.0       # 图片最小宽高比（移动端竖屏用，0则关闭）

# 向下滚动箭头
scroll_down_arrow:
  enable: true
  banner_height_limit: 80       # 头图高度不小于此比例（0-100）才显示箭头
  scroll_after_turning_page: true  # 翻页后自动滚动

# 返回顶部箭头
scroll_top_arrow:
  enable: true

# Open Graph 元标签（社交分享时的富媒体卡片）
open_graph:
  enable: true
  twitter_card: summary_large_image
  twitter_id:                   # Twitter 账号
  twitter_site:
  google_plus:
  fb_admins:                    # Facebook 管理员 ID
  fb_app_id:                    # Facebook App ID

#---------------------------
# 页脚 Footer
#---------------------------
footer:
  # 页脚第一行文字（HTML）
  content: '
    <a href="https://hexo.io" target="_blank" rel="nofollow noopener"><span>Hexo</span></a>
    <i class="iconfont icon-love"></i>
    <a href="https://github.com/fluid-dev/hexo-theme-fluid" target="_blank" rel="nofollow noopener"><span>Fluid</span></a>
  '
  # PV/UV 统计展示
  statistics:
    enable: false
    source: "busuanzi"          # 数据来源: busuanzi | leancloud | umami | openkounter
  # 备案信息（中国大陆服务器需要）
  beian:
    enable: false
    icp_text:                   # ICP 备案号，如：京ICP证123456号
    police_text:                # 公安备案号
    police_code:                # 公安备案编号
    police_icon:                # 公安备案图标

#---------------------------
# 首页 Home Page
#---------------------------
index:
  # 首页头图（路径相对于 source/，也可用外链）
  banner_img: /img/default.png
  banner_img_height: 100      # 头图高度（屏幕百分比 0-100）
  banner_mask_alpha: 0.3      # 头图黑色蒙版透明度（0-1.0，1 完全不透明）
  # 首页标语（副标题）
  slogan:
    enable: true
    text: "还要拐几个弯才能到呢"  # 为空则用 _config.yml 的 subtitle
    # 通过 API 获取动态标语（需要先开启打字机效果）
    api:
      enable: false
      url: ""                 # API 地址（返回 JSON 格式）
      method: "GET"
      headers: {}
      keys: []                # 从返回结果取值的字段路径
  # 自动摘要
  auto_excerpt:
    enable: true
  # 文章跳转方式: _blank(新标签页) | _self(当前页)
  post_url_target: _self
  # 文章信息显示（时间/分类/标签）
  post_meta:
    date: true
    category: true
    tag: true
  # 文章置顶图标
  post_sticky:
    enable: true
    icon: "iconfont icon-top"

#---------------------------
# 文章页 Post Page
#---------------------------
post:
  banner_img: /img/default.png
  banner_img_height: 70
  banner_mask_alpha: 0.3
  # 文章默认封面图（首页显示，front-matter 中 index_img 优先）
  default_index_img:
  # 文章标题下方元信息
  meta:
    author:                   # 作者显示
      enable: false
    date:                     # 发布日期
      enable: true
      format: "LL a"          # 格式见 http://momentjs.cn/docs/#/parsing/string-format/
    wordcount:                # 字数统计
      enable: true
    min2read:                 # 阅读时长
      enable: true
      awl: 2                  # 平均词长（中文≈2，英文≈5）
      wpm: 60                 # 每分钟阅读字数
    views:                    # 阅读次数
      enable: false
    updated:                  # 更新日期
      enable: false
      date_format: "LL a"
      relative: false         # 相对时间（如：3天前）
      note_class: info
  # 侧边栏：当前分类下的文章
  category_bar:
    enable: true
    specific: true            # 为 true 时需在 front-matter 指定 category_bar: true 才显示
    placement: left           # 位置: left | right
    post_order_by: "title"    # 排序: date | title | 或 front-matter 其他字段
    post_limit: 0             # 折叠展示数上限，0 不限制
  # 侧边栏：文章目录 TOC
  toc:
    enable: true
    expand_all: true          # 是否默认展开全部目录
    placement: right
    headingSelector: "h1,h2,h3,h4,h5,h6"
    collapseDepth: 0          # 折叠深度，0 全部折叠
  # 文末版权声明
  copyright:
    enable: true
    license: 'BY'             # CC 协议: BY | BY-SA | BY-ND | BY-NC | BY-NC-SA | BY-NC-ND | ZERO
    author:
      enable: true
    post_date:
      enable: true
      format: "LL"
    update_date:
      enable: false
      format: "LL"
  # 上一篇/下一篇导航
  prev_next:
    enable: true
  # 图片标题
  image_caption:
    enable: true
  # 图片 URL 替换（可用于点击放大时替换为原图，如 ['-slim','']）
  img_url_replace: ['', '']
  # 脚注语法
  footnote:
    enable: true
    header: ''                # 脚注节标题，如 '<h2>参考</h2>'
  # LaTeX 数学公式（开启前需更换 Markdown 渲染器）
  math:
    enable: false
    specific: false           # 为 true 时需在 front-matter 指定 math: true
    engine: mathjax           # 引擎: mathjax | katex
  # Mermaid 流程图
  mermaid:
    enable: false
    specific: false           # 为 true 时需在 front-matter 指定 mermaid: true
    options: { theme: 'default' }
  # 评论插件
  comments:
    enable: false             # 总开关
    # 可选: utterances | disqus | gitalk | valine | waline | twikoo | giscus | discuss
    type: disqus

#---------------------------
# 评论插件（需先在 post.comments 中启用并指定 type）
#---------------------------

# Utterances - 基于 GitHub Issues，轻量无后端
# 文档: https://utteranc.es
utterances:
  repo:                      # 仓库名，如 username/repo
  issue_term: pathname       # 关联方式: pathname | url | title | og:title
  label: utterances          # Issue 标签
  theme: github-light
  theme_dark: github-dark

# Disqus - 第三方评论服务（国内可能被墙）
# 文档: https://disqus.com
disqus:
  shortname:                 # Disqus 站点 shortname
  disqusjs: false            # 是否使用 DisqusJS 代理（国内推荐）
  apikey:
  api: https://disqus.skk.moe/disqus/
  admin:
  adminLabel:

# Gitalk - 基于 GitHub Issues
# 文档: https://github.com/gitalk/gitalk
gitalk:
  clientID:                  # GitHub OAuth App Client ID
  clientSecret:              # GitHub OAuth App Client Secret
  repo:                      # 仓库名
  owner:                     # 仓库所有者
  admin: ['name']            # 管理员 GitHub 用户名
  language: zh-CN
  labels: ['Gitalk']
  perPage: 10
  pagerDirection: last
  distractionFreeMode: false
  createIssueManually: true
  proxy: https://cors-anywhere.azm.workers.dev/https://github.com/login/oauth/access_token

# Valine - 基于 LeanCloud，国内推荐
# 文档: https://valine.js.org
valine:
  appId:                     # LeanCloud App ID
  appKey:                    # LeanCloud App Key
  path: window.location.pathname
  placeholder:               # 评论框占位文字
  avatar: 'retro'            # 头像风格
  meta: ['nick', 'mail', 'link']  # 评论者信息字段
  requiredFields: []         # 必填字段
  pageSize: 10
  lang: 'zh-CN'
  highlight: false
  recordIP: false
  serverURLs: ''
  emojiCDN:
  emojiMaps:
  enableQQ: false

# Waline - Valine 升级版，支持服务端部署
# 文档: https://waline.js.org
waline:
  serverURL: ''              # Waline 服务端地址
  path: window.location.pathname
  meta: ['nick', 'mail', 'link']
  requiredMeta: ['nick']
  lang: 'zh-CN'
  pageSize: 10
  wordLimit: 0
  login: 'enable'
  highlight: true
  mathTagSupport: false
  imageUploader: false       # 图片上传
  texRenderer: false
  search: false
  recaptchaV3Key: ''
  reaction: false

# Twikoo - 基于腾讯云开发
# 文档: https://twikoo.js.org
twikoo:
  envId:                     # 腾讯云环境 ID
  region:                    # 地域，如 ap-shanghai
  path: window.location.pathname

# Giscus - 基于 GitHub Discussions
# 文档: https://giscus.app
giscus:
  repo:                      # 仓库名
  repoId:                    # 仓库 ID
  categoryId:                # Discussion 分类 ID
  mapping: pathname
  reactionsEnabled: 1
  emitMetadata: 0
  inputPosition: top
  lang: zh-CN
  loading: lazy

# Discuss - 基于第三方服务
# 文档: https://discuss.js.org
discuss:
  serverURLs:
  path: window.location.pathname

#---------------------------
# 归档页 Archive Page
#---------------------------
archive:
  banner_img: /img/default.png
  banner_img_height: 60
  banner_mask_alpha: 0.3

#---------------------------
# 分类页 Category Page
#---------------------------
category:
  enable: true
  banner_img: /img/default.png
  banner_img_height: 60
  banner_mask_alpha: 0.3
  order_by: "-length"         # 排序: length(文章数) | name(名称)，带减号倒序
  collapse_depth: 0           # 折叠深度
  post_order_by: "-date"      # 文章排序
  post_limit: 10              # 单个分类折叠上限，0 不限制

#---------------------------
# 标签页 Tag Page
#---------------------------
tag:
  enable: true
  banner_img: /img/default.png
  banner_img_height: 80
  banner_mask_alpha: 0.3
  # 标签云配置
  tagcloud:
    min_font: 15              # 最小字号
    max_font: 30              # 最大字号
    unit: px                  # 字号单位
    start_color: "#BBBBEE"    # 起始颜色
    end_color: "#337ab7"      # 结束颜色

#---------------------------
# 关于页 About Page
#（需先运行 hexo new page about，并在 index.md 中设置 layout: about）
#---------------------------
about:
  enable: true
  banner_img: /img/default.png
  banner_img_height: 60
  banner_mask_alpha: 0.3
  avatar: /img/avatar.png    # 头像
  name: "Xendr1a"            # 昵称
  intro: "还要拐几个弯才能到呢"  # 简介
  # 社交图标（更多图标: https://fluid.ist/docs/icon/）
  # class=图标css类, link=链接, tip=悬浮提示, qrcode=二维码图片（替代链接）
  icons:
    - { class: "iconfont icon-github-fill", link: "https://github.com/Xendr1a", tip: "GitHub" }

#---------------------------
# 自定义页 Custom Page（hexo new page 创建的页面）
#---------------------------
page:
  banner_img: /img/default.png
  banner_img_height: 60
  banner_mask_alpha: 0.3

#---------------------------
# 404 页
#---------------------------
page404:
  enable: true
  banner_img: /img/default.png
  banner_img_height: 85
  banner_mask_alpha: 0.3
  redirect_delay: 5000       # 自动跳转首页延迟（毫秒），GitHub Pages 需绑定域名才生效

#---------------------------
# 友链页 Links Page（需先在 navbar.menu 中取消 links 注释）
#---------------------------
links:
  enable: true
  banner_img: /img/default.png
  banner_img_height: 60
  banner_mask_alpha: 0.3
  # 友链列表
  items:
    - title: "Fluid"
      link: "https://fluid.ist"
      img: "https://fluid.ist/img/favicon.png"
      intro: "Fluid 主题官方博客"
  # 友链页评论
  comments:
    enable: false
    type: disqus

#---------------------------
# CDN 静态资源前缀（⚠ 不要随意修改，除非你知道在做什么）
# 可以替换为自定义 CDN 地址以加速国内访问
#---------------------------
static_prefix:
  internal_js: /js
  internal_css: /css
  internal_img: /img
  anchor: https://lib.baomitu.com/anchor-js/5.0.0/
  github_markdown: https://lib.baomitu.com/github-markdown-css/4.0.0/
  jquery: https://lib.baomitu.com/jquery/3.6.4/
  bootstrap: https://lib.baomitu.com/twitter-bootstrap/4.6.1/
  prismjs: https://lib.baomitu.com/prism/1.29.0/
  tocbot: https://lib.baomitu.com/tocbot/4.20.1/
  typed: https://lib.baomitu.com/typed.js/2.0.12/
  fancybox: https://lib.baomitu.com/fancybox/3.5.7/
  nprogress: https://lib.baomitu.com/nprogress/0.2.0/
  mathjax: https://lib.baomitu.com/mathjax/3.2.2/
  katex: https://lib.baomitu.com/KaTeX/0.16.9/
  mermaid: https://lib.baomitu.com/mermaid/10.3.0/
  clipboard: https://lib.baomitu.com/clipboard.js/2.0.11/
  lazyload: https://lib.baomitu.com/vanilla-lazyload/17.8.3/
  isotope: https://lib.baomitu.com/jquery.isotope/3.0.6/
  search: https://lib.baomitu.com/hexo-generator-search/2.0.3/
  waline_js: https://lib.baomitu.com/waline/2.15.8/
  twikoo_js: https://lib.baomitu.com/twikoo/1.6.33/
  giscus_js: https://giscus.app/client.js
  discuss_js: https://lib.baomitu.com/discuss/1.2.2/
  disqusjs: https://lib.baomitu.com/disqusjs/3.0.2/
