# Hexo Configuration
## 文档: https://hexo.io/zh-cn/docs/configuration.html
## 源码: https://github.com/hexojs/hexo/

#---------------------------
# 站点信息 Site
#---------------------------
title: Xendr1a                              # 站点标题
subtitle: 'An elegant Material-Design theme for Hexo'  # 站点副标题
description: 'Xendr1a 的个人博客'            # 站点描述（SEO 用）
keywords:                                    # 站点关键词（SEO 用）
author: Xendr1a                              # 作者名
language: zh-CN                              # 语言（影响主题的多语言显示）
timezone: 'Asia/Shanghai'                    # 时区

#---------------------------
# URL 设置
#---------------------------
url: https://xendr1a.github.io               # 站点网址（必须正确配置！）
root: /                                      # 网站根目录（部署在子目录时需要修改）
permalink: :year/:month/:day/:title/         # 文章永久链接格式
permalink_defaults:                          # 永久链接中各部分的默认值
pretty_urls:
  trailing_index: true                       # 是否在链接末尾显示 index.html
  trailing_html: true                        # 是否在链接末尾显示 .html

#---------------------------
# 目录设置 Directory
#---------------------------
source_dir: source                           # 源文件夹
public_dir: public                           # 生成的静态文件文件夹
tag_dir: tags                                # 标签目录
archive_dir: archives                        # 归档目录
category_dir: categories                     # 分类目录
code_dir: downloads/code                     # 代码目录
i18n_dir: :lang                              # 国际化目录
skip_render:                                 # 跳过渲染的文件（如 README.md）

#---------------------------
# 文章 Writing
#---------------------------
new_post_name: :title.md                     # 新文章文件名格式
default_layout: post                         # 默认布局（post | page | draft）
titlecase: false                             # 标题是否自动转换为首字母大写
external_link:
  enable: true                               # 外链是否在新标签页打开
  field: site                                # 作用范围：site(全站) | post(仅文章)
  exclude: ''                                # 排除的域名（不新开标签页）
filename_case: 0                             # 文件名大小写转换（0 不转换，1 小写，2 大写）
render_drafts: false                         # 是否渲染草稿
post_asset_folder: false                     # 是否为每篇文章创建资源文件夹（图片放一起）
relative_link: false                         # 是否使用相对链接
future: true                                 # 是否显示未来日期的文章
syntax_highlighter: highlight.js             # 代码高亮引擎（主题配置中会覆盖）
highlight:
  line_number: true                          # 显示行号
  auto_detect: false                         # 自动检测语言
  tab_replace: ''                            # Tab 替换字符
  wrap: true                                 # 代码块是否换行
  hljs: false                                # 是否使用 highlight.js
prismjs:                                     # Prism.js 配置
  preprocess: true
  line_number: true
  tab_replace: ''

#---------------------------
# 首页设置 Home Page
#---------------------------
index_generator:
  path: ''                                   # 首页路径
  per_page: 10                               # 每页显示文章数（0 为不分页）
  order_by: -date                            # 文章排序（-date 按日期倒序）

#---------------------------
# 分类 & 标签 Category & Tag
#---------------------------
default_category: uncategorized              # 默认分类
category_map:                                # 分类别名（如：技术: tech）
tag_map:                                     # 标签别名

#---------------------------
# 元数据 Metadata
#---------------------------
meta_generator: true                         # 是否在 HTML 中插入 Hexo 版本信息

#---------------------------
# 日期/时间格式 Date / Time
#---------------------------
date_format: YYYY-MM-DD                      # 日期格式（Moment.js 格式）
time_format: HH:mm:ss                        # 时间格式
updated_option: 'mtime'                      # 更新日期来源：mtime(文件修改时间) | date(文章date) | empty(不显示)

#---------------------------
# 分页 Pagination
#---------------------------
per_page: 10                                 # 每页文章数（0 禁用分页）
pagination_dir: page                         # 分页目录名

#---------------------------
# 包含/排除文件 Include / Exclude
#---------------------------
include:                                     # 包含的文件（仅对 source/ 生效）
exclude:                                     # 排除的文件
ignore:                                      # 忽略的文件

#---------------------------
# 扩展 Extensions
#---------------------------
theme: fluid                                 # 指定主题（⚠ 必须与主题文件夹名一致）

#---------------------------
# 部署 Deployment
#---------------------------
deploy:
  type: git                                  # 部署类型：git
  repo: https://github.com/Xendr1a/Xendr1a.github.io.git  # 仓库地址
  branch: main                               # 部署分支
  message: "Site updated: {{ now('YYYY-MM-DD HH:mm:ss') }}"  # 提交信息
